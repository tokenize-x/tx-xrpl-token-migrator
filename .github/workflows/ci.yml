name: ci
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        ci_step: [
          "lint",
          "test",
          "integration tests",
          "contract lint and test"
        ]
        include:
          - ci_step: "lint"
            command: "make build-contract && make lint"
          - ci_step: "test"
            command: "make build-contract && make test"
          - ci_step: "integration tests"
            command: "make build-contract && make rebuild-dev-env && make restart-dev-env && make test-integration"
          - ci_step: "contract lint and test"
            command: "make test-contract"

    runs-on: self-hosted
    steps:
      - name: Hard Cleanup Workspace
          run: |
            # Use sudo if your runner user doesn't have permission to delete root-owned docker files
            sudo rm -rf "${{ github.workspace }}/xrpl-bridge"
            sudo rm -rf "${{ github.workspace }}/coreum"
            # Kill any dangling docker containers that might be locking volumes
            docker rm -f $(docker ps -aq) || true
      - name: Checkout xrpl bridge
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          path: ${{ matrix.ci_step }}/xrpl-bridge
          fetch-depth: 0
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.TX_CHAIN_PRIVATE_KEY }}
            ${{ secrets.TX_TOOLS_PRIVATE_KEY }}
            ${{ secrets.TX_CRUST_PRIVATE_KEY }}
      - name: Setup tx-chain access
        run: |
          export GOPRIVATE=github.com/tokenize-x
          mkdir -p ~/.ssh
          
          # Use > instead of >> to prevent the SSH config from growing infinitely
          cat <<EOF > ~/.ssh/config
          Host tx-chain-private
              HostName github.com
              User git
              IdentityFile ~/.ssh/tx-chain-deploy-key
              IdentitiesOnly yes
          Host tx-tools-private
              HostName github.com
              User git
              IdentityFile ~/.ssh/tx-tools-deploy-key
              IdentitiesOnly yes
          Host tx-crust-private
              HostName github.com
              User git
              IdentityFile ~/.ssh/tx-crust-deploy-key
              IdentitiesOnly yes
          EOF

          # Use --replace-all to handle existing entries in the persistent .gitconfig
          git config --global --replace-all url."git@tx-chain-private:tokenize-x/tx-chain".insteadOf "git@github.com:tokenize-x/tx-chain"
          git config --global --add url."git@tx-chain-private:tokenize-x/tx-chain".insteadOf "https://github.com/tokenize-x/tx-chain"
          
          git config --global --replace-all url."git@tx-tools-private:tokenize-x/tx-tools".insteadOf "git@github.com:tokenize-x/tx-tools"
          git config --global --add url."git@tx-tools-private:tokenize-x/tx-tools".insteadOf "https://github.com/tokenize-x/tx-tools"
          
          git config --global --replace-all url."git@tx-crust-private:tokenize-x/tx-crust".insteadOf "git@github.com:tokenize-x/tx-crust"
          git config --global --add url."git@tx-crust-private:tokenize-x/tx-crust".insteadOf "https://github.com/tokenize-x/tx-crust"
      - name: Checkout xrpl bridge
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          path: xrpl-bridge
          submodules: recursive
          fetch-depth: 0
      - name: Checkout coreum
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          repository: CoreumFoundation/coreum
          path: coreum
          ref: v5.0.1
          submodules: recursive
          fetch-depth: 0
      - name: Install go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.3'
      - name: Run ${{ matrix.ci_step }}
        working-directory: ./xrpl-bridge
        run: ${{ matrix.command }}
      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
