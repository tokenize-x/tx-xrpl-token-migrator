name: ci
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        ci_step: [
          "lint",
          "test",
          "integration-tests",
          "contract-lint-and-test"
        ]
        include:
          - ci_step: "lint"
            command: "make build-contract && make lint"
          - ci_step: "test"
            command: "make build-contract && make test"
          - ci_step: "integration-tests"
            command: "make build-contract && make rebuild-dev-env && make restart-dev-env && make test-integration"
          - ci_step: "contract-lint-and-test"
            command: "make test-contract"

    runs-on: self-hosted
    steps:
      - name: Checkout xrpl bridge
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          path: ${{ matrix.ci_step }}/xrpl-bridge
          fetch-depth: 0
          submodules: recursive
      - name: Checkout tx-chain
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          repository: tokenize-x/tx-chain
          path: ${{ matrix.ci_step }}/tx-chain
          ref: v5.0.1
          submodules: recursive
          fetch-depth: 0
      - name: Install go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.3'
      - name: Run ${{ matrix.ci_step }}
        working-directory: ${{ matrix.ci_step }}/xrpl-bridge
        run: ${{ matrix.command }}
      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
