name: ci
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 1 * * 1' # At 01:00 on Monday
  workflow_dispatch:

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        ci_step: [
          "lint",
          "integration tests",
          "contract lint and tests"
        ]
        include:
          - ci_step: "lint"
            command: "make build-contract && make lint"
            go-cache: true
            wasm-cache: false
            linter-cache: true
            docker-cache: false
          - ci_step: "integration tests"
            command: "crust images && crust znet start --profiles=integration-tests-ibc && make build-contract && make test-integration"
            go-cache: true
            wasm-cache: true
            linter-cache: false
            docker-cache: true
          - ci_step: "contract lint and tests"
            command: "cd contract && rustup update && cargo clippy --all && cargo test --verbose"
            go-cache: false
            wasm-cache: false
            linter-cache: false
            docker-cache: false

    runs-on: ubuntu-22.04
    steps:
      - name: Go version used to build crust tool
        run: go version
      - name: Checkout xrpl bridge
        uses: actions/checkout@v3
        with:
          persist-credentials: false
          path: xrpl-bridge
      - name: Checkout crust
        uses: actions/checkout@v3
        with:
          repository: CoreumFoundation/crust
          path: crust
          ref: coreum-v2.0.2
      - name: Checkout coreum
        uses: actions/checkout@v3
        with:
          repository: CoreumFoundation/coreum
          path: coreum
          ref: v2.0.2
      - name: Set up crust
        run: echo "$(pwd)/crust/bin" >> $GITHUB_PATH
      - name: Setup go cache
        uses: actions/cache@v3
        if: ${{ matrix.go-cache }}
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Setup WASM cache
        uses: actions/cache@v3
        if: ${{ matrix.wasm-cache }}
        with:
          path: ~/.cache/crust/wasm
          key: ${{ runner.os }}-wasm-cache-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wasm-cache
      - name: Setup linter cache
        uses: actions/cache@v3
        if: ${{ matrix.linter-cache }}
        with:
          path: ~/.cache/golangci-lint
          key: ${{ runner.os }}-linter-cache
      - name: Get Date
        id: get-year-week
        run: |
          echo "date=$(/bin/date -u "+%Y-%U")" >> $GITHUB_OUTPUT
        shell: bash
      - name: Set docker cache
        uses: satackey/action-docker-layer-caching@v0.0.11
        if: ${{ matrix.docker-cache }}
        continue-on-error: true
        with:
          key: ${{ runner.os }}-docker-${{ steps.get-year-week.outputs.date }} # year-week key
          restore-keys: |
            ${{ runner.os }}-docker-
      - name: Run ${{ matrix.ci_step }}
        working-directory: ./xrpl-bridge
        run: export XRPL_TESTNET_RPC_URL=${{ secrets.XRPL_TESTNET_RPC_URL }} && ${{ matrix.command }}
      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
