name: ci
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 1 * * 1' # At 01:00 on Monday
  workflow_dispatch:

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        ci_step: [
          "lint",
          "test",
          "integration tests",
          "contract lint and test"
        ]
        include:
          - ci_step: "lint"
            command: "make build-contract && make lint"
          - ci_step: "test"
            command: "make build-contract && make test"
          - ci_step: "integration tests"
            command: "make build-contract && make rebuild-dev-env && make restart-dev-env && make test-integration"
          - ci_step: "contract lint and test"
            command: "make test-contract"

    runs-on: ubuntu-24.04
    steps:
      - name: Checkout xrpl bridge
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          path: xrpl-bridge
      - name: Checkout coreum
        uses: actions/checkout@v4
        with:
          repository: CoreumFoundation/coreum
          path: coreum
          ref: v5.0.1
      - name: Install go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.3'
      - name: Run ${{ matrix.ci_step }}
        working-directory: ./xrpl-bridge
        run: ${{ matrix.command }}
      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
