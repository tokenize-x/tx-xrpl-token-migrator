name: ci
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 1 * * 1' # At 01:00 on Monday
  workflow_dispatch:

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        ci_step: [
          "lint",
          "integration tests",
          "contract lint and tests"
        ]
        include:
          - ci_step: "lint"
            command: "make build-contract && make lint"
            go-cache: true
            wasm-cache: false
            linter-cache: true
            docker-cache: false
          - ci_step: "integration tests"
            command: "make build-contract && make rebuild-dev-env && make restart-dev-env && make test-integration"
            go-cache: true
            wasm-cache: true
            linter-cache: false
            docker-cache: true
          - ci_step: "contract lint and tests"
            command: "cd contract && rustup default stable && cargo clippy --all && cargo test --verbose"
            go-cache: false
            wasm-cache: false
            linter-cache: false
            docker-cache: false

    runs-on: self-hosted
    steps:
      - name: Go version used to build crust tool
        run: go version
      - name: Checkout xrpl bridge
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          path: xrpl-bridge
      - name: Checkout crust
        uses: actions/checkout@v4
        with:
          repository: CoreumFoundation/crust
          path: crust
          ref: coreum-v3.0.3
      - name: Checkout coreum
        uses: actions/checkout@v4
        with:
          repository: CoreumFoundation/coreum
          path: coreum
          ref: v3.0.3
      - name: Set up crust
        run: echo "$(pwd)/crust/bin" >> $GITHUB_PATH
      - name: Run ${{ matrix.ci_step }}
        working-directory: ./xrpl-bridge
        run: ${{ matrix.command }}
      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
