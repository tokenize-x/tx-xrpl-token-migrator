name: release
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  release:
    runs-on: self-hosted
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.TX_CHAIN_PRIVATE_KEY }}
            ${{ secrets.TX_TOOLS_PRIVATE_KEY }}
            ${{ secrets.TX_CRUST_PRIVATE_KEY }}
      - name: Setup tx-chain access
        run: |
          export GOPRIVATE=github.com/tokenize-x
          mkdir -p ~/.ssh

          # Use > instead of >> to prevent the SSH config from growing infinitely
          cat <<EOF > ~/.ssh/config
          Host tx-chain-private
              HostName github.com
              User git
              IdentityFile ~/.ssh/tx-chain-deploy-key
              IdentitiesOnly yes
          Host tx-tools-private
              HostName github.com
              User git
              IdentityFile ~/.ssh/tx-tools-deploy-key
              IdentitiesOnly yes
          Host tx-crust-private
              HostName github.com
              User git
              IdentityFile ~/.ssh/tx-crust-deploy-key
              IdentitiesOnly yes
          EOF

          # Use --replace-all to handle existing entries in the persistent .gitconfig
          git config --global --replace-all url."git@tx-chain-private:tokenize-x/tx-chain".insteadOf "git@github.com:tokenize-x/tx-chain"
          git config --global --add url."git@tx-chain-private:tokenize-x/tx-chain".insteadOf "https://github.com/tokenize-x/tx-chain"

          git config --global --replace-all url."git@tx-tools-private:tokenize-x/tx-tools".insteadOf "git@github.com:tokenize-x/tx-tools"
          git config --global --add url."git@tx-tools-private:tokenize-x/tx-tools".insteadOf "https://github.com/tokenize-x/tx-tools"

          git config --global --replace-all url."git@tx-crust-private:tokenize-x/tx-crust".insteadOf "git@github.com:tokenize-x/tx-crust"
          git config --global --add url."git@tx-crust-private:tokenize-x/tx-crust".insteadOf "https://github.com/tokenize-x/tx-crust"
      - name: Checkout xrpl bridge
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          path: xrpl-bridge
          submodules: recursive
          fetch-depth: 0
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - name: Install go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.3"
      - name: Build contract
        working-directory: ./xrpl-bridge
        run: make build-contract
      - name: Build linux amd64
        working-directory: ./xrpl-bridge
        run: GOOS=linux GOARCH=amd64 make build-in-docker
      - name: Check Tag
        id: check-tag
        run: |
          if [[ ${{ github.event.ref }} =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo ::set-output name=release::true
          fi
          if [[ ${{ github.event.ref }} =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
              echo ::set-output name=release_candidate::true
          fi
      - name: Link released binaries and contract under right names
        run: |
          ln xrpl-bridge/artifacts/relayer relayer-linux-amd64
          if [ -f xrpl-bridge/contract/artifacts/threshold_bank_send.wasm ]; then
            ln xrpl-bridge/contract/artifacts/threshold_bank_send.wasm threshold_bank_send.wasm
          fi
      - name: Generate checksums
        run: |
          # checksum for the relayer binary
          sha256sum relayer-linux-amd64 > checksums.txt
          # checksum for the contract wasm if present
          if [ -f threshold_bank_send.wasm ]; then
            sha256sum threshold_bank_send.wasm >> checksums.txt
          fi
          cat checksums.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          files: |
            relayer-linux-amd64
            threshold_bank_send.wasm
            checksums.txt
