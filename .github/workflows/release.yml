name: release
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  release:
    runs-on: self-hosted
    steps:
      - name: Setup SSH keys for private Go modules
        run: |
          # Create SSH directory if it doesn't exist
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Write deploy keys to files (used by Docker build secrets)
          echo "${{ secrets.TX_CHAIN_PRIVATE_KEY }}" > ~/.ssh/tx-chain-deploy-key
          echo "${{ secrets.TX_TOOLS_PRIVATE_KEY }}" > ~/.ssh/tx-tools-deploy-key
          echo "${{ secrets.TX_CRUST_PRIVATE_KEY }}" > ~/.ssh/tx-crust-deploy-key
          chmod 600 ~/.ssh/tx-chain-deploy-key ~/.ssh/tx-tools-deploy-key ~/.ssh/tx-crust-deploy-key
      - name: Checkout xrpl bridge
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          path: xrpl-bridge
          submodules: recursive
          fetch-depth: 0
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - name: Install go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.3'
      - name: Build contract
        working-directory: ./xrpl-bridge
        run: make build-contract
      - name: Build linux amd64
        working-directory: ./xrpl-bridge
        run: |
          export DOCKER_BUILDKIT=1
          GOOS=linux GOARCH=amd64 make build-in-docker
      - name: Check Tag
        id: check-tag
        run: |
          if [[ ${{ github.event.ref }} =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo ::set-output name=release::true
          fi
          if [[ ${{ github.event.ref }} =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
              echo ::set-output name=release_candidate::true
          fi
      - name: Copy released binaries and contract under right names
        run: |
          cp xrpl-bridge/artifacts/relayer relayer-linux-amd64
          if [ -f xrpl-bridge/contract/artifacts/threshold_bank_send.wasm ]; then
            cp xrpl-bridge/contract/artifacts/threshold_bank_send.wasm threshold_bank_send.wasm
          fi
      - name: Generate checksums
        run: |
          # checksum for the relayer binary
          sha256sum relayer-linux-amd64 > checksums.txt
          # checksum for the contract wasm if present
          if [ -f threshold_bank_send.wasm ]; then
            sha256sum threshold_bank_send.wasm >> checksums.txt
          fi
          cat checksums.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          files: |
            relayer-linux-amd64
            threshold_bank_send.wasm
            checksums.txt
      - name: Cleanup SSH keys
        if: always()
        run: |
          rm -f ~/.ssh/tx-chain-deploy-key ~/.ssh/tx-tools-deploy-key ~/.ssh/tx-crust-deploy-key
