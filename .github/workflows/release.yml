name: release
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  ci:
    runs-on: ubuntu-22.04
    steps:
      - name: Go version used for the build
        run: go version
      - name: Checkout xrpl bridge
        uses: actions/checkout@v3
        with:
          persist-credentials: false
          path: xrpl-bridge
      - name: Build linux amd64
        working-directory: ./xrpl-bridge
        run: GOOS=linux GOARCH=amd64 make build-in-docker
      - name: Check Tag
        id: check-tag
        run: |
          if [[ ${{ github.event.ref }} =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo ::set-output name=release::true
          fi
          if [[ ${{ github.event.ref }} =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
              echo ::set-output name=release_candidate::true
          fi
      - name: Link released binaries under right names
        run: |
          ln xrpl-bridge/build/relayer relayer-linux-amd64
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          files: |
            relayer-linux-amd64